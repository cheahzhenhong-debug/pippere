<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>联系我们 | 胡椒公司官网</title>

  <meta name="description" content="Pepper Company 联系方式">
  <meta name="keywords" content="pepper, 胡椒, contact, 联系">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 顶部导航 -->
  <nav class="nav">
    <h2>🌶 Pepper Company</h2>
    <div>
      <a href="index.html">首页</a>
      <a href="about.html">关于我们</a>
      <a href="products.html">产品</a>
      <a href="contact.html">联系</a>
    </div>
  </nav>

  <!-- 联系区 -->
  <header class="hero">
    <h1>联系我们</h1>
    <p>让我们为您服务</p>
  </header>

  <!-- 联系表单 -->
  <section class="section">
    <div class="contact-container">
      <form class="contact-form">
        <div class="form-group">
          <label for="name">姓名 *</label>
          <input type="text" id="name" name="name" required>
        </div>
        
        <div class="form-group">
          <label for="email">邮箱 *</label>
          <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
          <label for="subject">主题 *</label>
          <input type="text" id="subject" name="subject" required>
        </div>
        
        <div class="form-group">
          <label for="message">消息 *</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>
        
        <button type="submit" class="btn">发送</button>
      </form>

      <div class="contact-info">
        <h3>联系信息</h3>
        <p><strong>电话:</strong> +60 123 4567 890</p>
        <p><strong>邮箱:</strong> info@peppercompany.com</p>
        <p><strong>地址:</strong> Kuala Lumpur, Malaysia</p>
      </div>
    </div>
  </section>

  <!-- 页脚 -->
  <footer>
    <p>© 2026 Pepper Company. All Rights Reserved.</p>
  </footer>

</body>
</html>
