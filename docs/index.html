<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PIPERÉ</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f8f5f2;
            text-align: center;
        }

        header {
            padding: 30px 20px;
            background-color: white;
        }

        header img {
            width: 120px;
        }

        h1 {
            margin: 10px 0;
            letter-spacing: 5px;
        }

        nav {
            margin-top: 10px;
        }

        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }

        .hero {
            padding: 60px 20px;
        }

        .products {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 40px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 20px;
            width: 220px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            border-radius: 8px;
        }

        .price {
            color: #8b5e3c;
            font-weight: bold;
        }

        footer {
            padding: 20px;
            background: #333;
            color: white;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>
    <img src="images/logo.jpg" alt="PIPERÉ Logo">
    <h1>PIPERÉ</h1>

    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Premium Black Pepper</h2>
    <p>Fresh. Aromatic. Direct from farm.</p>
</section>

<section class="products">

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Pepper">
        <h3>Black Pepper 100g</h3>
        <p class="price">RM 12</p>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Pepper">
        <h3>Black Pepper 250g</h3>
        <p class="price">RM 25</p>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Pepper">
        <h3>Premium Pepper 500g</h3>
        <p class="price">RM 45</p>
    </div>

</section>

<footer>
    <p>© 2026 PIPERÉ. All rights reserved.</p>
</footer>

</body>
</html>
